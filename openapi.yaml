openapi: 3.0.3
info:
  title: VTT MVP Backend API
  version: 1.0.0
  description: Contrato OpenAPI dos endpoints implementados no backend.
servers:
  - url: http://localhost:4000
    description: Local

tags:
  - name: Auth
  - name: Sessions
  - name: Characters
  - name: Templates
  - name: Messages
  - name: User

paths:
  /:
    get:
      tags: [Sessions]
      summary: Healthcheck
      responses:
        '200':
          description: API online
          content:
            text/plain:
              schema:
                type: string
                example: VTT Backend Running

  /auth/register:
    post:
      tags: [Auth]
      summary: Iniciar cadastro de usuário
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: Gui
              email: gui@example.com
              password: "123456"
      responses:
        '202':
          description: Cadastro pendente criado e código de verificação enviado por email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterPendingResponse'
        '400':
          description: Erro de validação/regra de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/register/verify:
    post:
      tags: [Auth]
      summary: Confirmar cadastro com código de verificação
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyRegisterRequest'
            example:
              email: gui@example.com
              code: "123456"
      responses:
        '201':
          description: Código validado e usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Código inválido, expirado ou cadastro pendente não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login do usuário
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: gui@example.com
              password: "123456"
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions:
    get:
      tags: [Sessions]
      summary: Listar sessões
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de sessões
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionListItem'
        '401':
          description: Token inválido/ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Erro de regra de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Sessions]
      summary: Criar sessão
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
            example:
              name: Mesa de D&D
              password: segreda
      responses:
        '200':
          description: Sessão criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          description: Token inválido/ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Erro de regra de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions/join:
    post:
      tags: [Sessions]
      summary: Entrar em uma sessão
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinSessionRequest'
            example:
              sessionId: "2d2df0fb-ef95-460d-b344-61e2bd2d3020"
              password: segreda
      responses:
        '200':
          description: Participação criada ou já existente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionParticipant'
        '401':
          description: Token inválido/ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Erro de validação/regra de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions/{sessionId}:
    get:
      tags: [Sessions]
      summary: Obter uma sessão por ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Sessão encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          description: Erro de validação/regra de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido/ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não participa da sessão
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions/{sessionId}/characters:
    get:
      tags: [Characters]
      summary: Listar personagens da sessão
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Lista de personagens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CharacterListItem'
        '400':
          description: Erro de validação/regra de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido/ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não participa da sessão
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Characters]
      summary: Criar personagem na sessão
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCharacterRequest'
            example:
              name: Arannis
              templateId: "template-1"
              data:
                hp: 12
                mana: 20
                str: 8
                int: 16
      responses:
        '200':
          description: Personagem criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '400':
          description: Erro de validação/regra de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido/ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não participa da sessão
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /templates:
    get:
      tags: [Templates]
      summary: Listar templates
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: Filtra templates por nome
          example: mage
        - name: userId
          in: query
          required: false
          schema:
            type: string
          description: Filtra templates pelo usuário criador
          example: "4f8ed00e-e13a-4672-a85d-4f484f073032"
      responses:
        '200':
          description: Lista de templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Template'
        '400':
          description: Erro de validação/regra de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido/ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Templates]
      summary: Criar template
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
            example:
              name: Mage
              data:
                hp: 8
                mana: 20
                intelligence: 16
      responses:
        '200':
          description: Template criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '400':
          description: Erro de validação/regra de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido/ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /templates/{templateId}:
    get:
      tags: [Templates]
      summary: Obter template por ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      responses:
        '200':
          description: Template encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '400':
          description: Erro de validação/regra de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido/ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Templates]
      summary: Atualizar template
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateRequest'
            example:
              name: Mage
              data:
                hp: 9
                mana: 24
      responses:
        '200':
          description: Template atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '400':
          description: Erro de validação/regra de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido/ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Templates]
      summary: Remover template
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      responses:
        '200':
          description: Template removido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccess'
        '400':
          description: Erro de validação/regra de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido/ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/preferences:
    get:
      tags: [User]
      summary: Obter preferências do usuário autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Preferências do usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferencesResponse'
        '400':
          description: Erro de validação/regra de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido/ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [User]
      summary: Atualizar preferências do usuário autenticado
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserPreferencesRequest'
            example:
              preferences:
                theme: light
                language: pt-BR
                notifications:
                  email: true
      responses:
        '200':
          description: Preferências atualizadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferencesResponse'
        '400':
          description: Erro de validação/regra de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido/ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions/{sessionId}/characters/{characterId}:
    put:
      tags: [Characters]
      summary: Atualizar dados de personagem
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/CharacterId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCharacterRequest'
            example:
              data:
                hp: 9
                mana: 18
      responses:
        '200':
          description: Personagem atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '400':
          description: Erro de validação/regra de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido/ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não participa da sessão
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Characters]
      summary: Remover personagem
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/CharacterId'
      responses:
        '200':
          description: Personagem removido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccess'
        '400':
          description: Erro de validação/regra de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido/ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não participa da sessão
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sessions/{sessionId}/messages:
    get:
      tags: [Messages]
      summary: Listar mensagens da sessão
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Lista de mensagens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '400':
          description: Erro de validação/regra de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido/ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não participa da sessão
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Messages]
      summary: Enviar mensagem na sessão
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
            example:
              content: "Rolando 1d20"
              type: DICE
              diceData:
                expression: 1d20
                result: 17
      responses:
        '200':
          description: Mensagem criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Erro de validação/regra de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token inválido/ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário não participa da sessão
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
      description: ID da sessão
      example: "2d2df0fb-ef95-460d-b344-61e2bd2d3020"
    CharacterId:
      name: characterId
      in: path
      required: true
      schema:
        type: string
      description: ID do personagem
      example: "1d53fb9f-b2f1-4bfa-9f6c-4a8aef532d0c"
    TemplateId:
      name: templateId
      in: path
      required: true
      schema:
        type: string
      description: ID do template
      example: "template-1"

  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]
      example:
        message: Token inválido

    DeleteSuccess:
      type: object
      properties:
        success:
          type: boolean
          example: true
      required: [success]

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
      required: [name, email, password]

    VerifyRegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          description: Código de verificação enviado por email
      required: [email, code]

    RegisterPendingResponse:
      type: object
      properties:
        message:
          type: string
        email:
          type: string
          format: email
      required: [message, email]
      example:
        message: Código de verificação enviado para o email informado.
        email: gui@example.com

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    UserPublic:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        preferences:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, preferences, createdAt]
      example:
        id: "4f8ed00e-e13a-4672-a85d-4f484f073032"
        name: Gui
        email: gui@example.com
        preferences:
          theme: dark
          language: pt-BR
        createdAt: "2026-03-05T10:30:00.000Z"

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserPublic'
        token:
          type: string
      required: [user, token]
      example:
        user:
          id: "4f8ed00e-e13a-4672-a85d-4f484f073032"
          name: Gui
          email: gui@example.com
          createdAt: "2026-03-05T10:30:00.000Z"
        token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    UpdateUserPreferencesRequest:
      type: object
      properties:
        preferences:
          type: object
          additionalProperties: true
      required: [preferences]

    UserPreferencesResponse:
      type: object
      properties:
        preferences:
          type: object
          additionalProperties: true
      required: [preferences]
      example:
        preferences:
          theme: light
          language: pt-BR
          notifications:
            email: true

    CreateSessionRequest:
      type: object
      properties:
        name:
          type: string
        password:
          type: string
          nullable: true
      required: [name]

    JoinSessionRequest:
      type: object
      properties:
        sessionId:
          type: string
        password:
          type: string
      required: [sessionId]

    Session:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        passwordHash:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        createdById:
          type: string
      required: [id, name, createdAt, createdById]
      example:
        id: "2d2df0fb-ef95-460d-b344-61e2bd2d3020"
        name: Mesa de D&D
        passwordHash: "$2b$10$..."
        createdAt: "2026-03-05T10:35:00.000Z"
        createdById: "4f8ed00e-e13a-4672-a85d-4f484f073032"

    SessionListItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: object
          properties:
            name:
              type: string
          required: [name]
      required: [id, name, createdAt, createdBy]
      example:
        id: "2d2df0fb-ef95-460d-b344-61e2bd2d3020"
        name: Mesa de D&D
        createdAt: "2026-03-05T10:35:00.000Z"
        createdBy:
          name: Gui

    SessionParticipant:
      type: object
      properties:
        id:
          type: string
        joinedAt:
          type: string
          format: date-time
        userId:
          type: string
        sessionId:
          type: string
      required: [id, joinedAt, userId, sessionId]
      example:
        id: "b4a59f9b-4bdb-40c2-b5d4-12c4ac6ef2fd"
        joinedAt: "2026-03-05T10:40:00.000Z"
        userId: "4f8ed00e-e13a-4672-a85d-4f484f073032"
        sessionId: "2d2df0fb-ef95-460d-b344-61e2bd2d3020"

    CreateCharacterRequest:
      type: object
      properties:
        name:
          type: string
        templateId:
          type: string
        data:
          type: object
          additionalProperties: true
      required: [name, templateId, data]

    UpdateCharacterRequest:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true
      required: [data]

    Character:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        templateId:
          type: string
        data:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        userId:
          type: string
        sessionId:
          type: string
      required: [id, name, templateId, data, createdAt, userId, sessionId]
      example:
        id: "1d53fb9f-b2f1-4bfa-9f6c-4a8aef532d0c"
        name: Arannis
        templateId: "template-1"
        data:
          hp: 12
          mana: 20
        createdAt: "2026-03-05T10:45:00.000Z"
        userId: "4f8ed00e-e13a-4672-a85d-4f484f073032"
        sessionId: "2d2df0fb-ef95-460d-b344-61e2bd2d3020"

    CharacterListItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        template:
          type: object
          properties:
